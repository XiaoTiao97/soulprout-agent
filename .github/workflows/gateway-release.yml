name: Gateway Release

on:
  push:
    tags:
      - 'gateway-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Gateway installer
        shell: pwsh
        run: .\gateway-app\scripts\build.ps1

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gateway-app/src-tauri/target/release/bundle/nsis/Soulprout-Gateway-setup.exe
          generate_release_notes: true
