<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微信接入 · Soulprout Gateway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #06100d;
      --bg-card:      rgba(14, 26, 22, 0.85);
      --accent:       #1eb48c;
      --accent-dim:   rgba(30, 180, 140, 0.12);
      --accent-border:rgba(30, 180, 140, 0.22);
      --text:         #dff0e9;
      --text-sub:     rgba(223, 240, 233, 0.45);
      --text-muted:   rgba(223, 240, 233, 0.22);
      --border:       rgba(255, 255, 255, 0.06);
      --border-hover: rgba(30, 180, 140, 0.28);
      --shadow:       0 0 60px rgba(30,180,140,0.06), 0 4px 32px rgba(0,0,0,0.35);
    }

    body {
      font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── BG ─── */
    .bg-deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bg-radial {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 38%,
        rgba(30,180,140,0.055) 0%, transparent 68%);
    }
    .bg-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }
    .bg-ring-1 { width: 900px; height: 900px; border: 1px solid rgba(30,180,140,0.04); }
    .bg-ring-2 { width: 560px; height: 560px; border: 1px solid rgba(30,180,140,0.06); }

    /* ─── Header ─── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2rem;
      background: rgba(6, 16, 13, 0.75);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 0.375rem 0.875rem;
      border-radius: 2rem;
      font-size: 0.8125rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
    }
    .btn-back:hover { border-color: var(--accent-border); color: var(--accent); }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      text-decoration: none;
    }
    .brand-logo {
      width: 1.75rem; height: 1.75rem;
      background: linear-gradient(135deg, #1eb48c 0%, #0fa06e 100%);
      border-radius: 0.4rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .page-tag {
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 1rem;
    }
    .header-right { display: flex; align-items: center; gap: 0.75rem; }
    .btn-locale {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 0.35rem 0.75rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .btn-locale:hover { border-color: var(--accent-border); color: var(--accent); }

    /* ─── Main ─── */
    .page-main {
      position: relative;
      z-index: 10;
      max-width: 520px;
      margin: 0 auto;
      padding: 6rem 1.5rem 3rem;
    }

    /* ─── Page header ─── */
    .page-header { margin-bottom: 2rem; }
    .page-eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(30,180,140,0.5);
      font-weight: 300;
      margin-bottom: 0.5rem;
    }
    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 0.375rem;
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }
    .page-desc {
      font-size: 0.875rem;
      color: var(--text-sub);
      font-weight: 300;
      line-height: 1.6;
    }

    /* ─── Section card ─── */
    .section-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.5rem 1.75rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.35s;
    }
    .section-card:hover { border-color: rgba(30,180,140,0.14); }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(30,180,140,0.45);
      font-weight: 300;
      margin-bottom: 1.25rem;
    }

    /* Status rows */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem 0;
    }
    .status-row + .status-row { border-top: 1px solid rgba(255,255,255,0.04); }
    .status-label { font-size: 0.875rem; color: var(--text-sub); }
    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .badge-green  { background: rgba(30,180,140,0.14); color: var(--accent); }
    .badge-red    { background: rgba(229, 90, 90, 0.14); color: #e55a5a; }
    .badge-gray   { background: rgba(255,255,255,0.06); color: var(--text-sub); }
    .badge-yellow { background: rgba(210,153,34,0.14);  color: #d29922; }

    /* QR area */
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 0 0.5rem;
    }
    .qr-frame {
      width: 192px; height: 192px;
      background: #fff;
      border-radius: 1rem;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 1px rgba(30,180,140,0.15);
    }
    .qr-frame img { width: 100%; height: 100%; object-fit: contain; }
    .qr-placeholder {
      font-size: 0.8125rem;
      color: #888;
      text-align: center;
      padding: 1.5rem;
      line-height: 1.6;
    }
    .qr-hint {
      font-size: 0.8125rem;
      color: var(--text-sub);
      text-align: center;
      line-height: 1.7;
    }
    .qr-link {
      font-size: 0.75rem;
      color: var(--accent);
      word-break: break-all;
      text-align: center;
      text-decoration: none;
    }
    .qr-link:hover { text-decoration: underline; }

    .poll-msg {
      font-size: 0.8125rem;
      min-height: 1.1rem;
      text-align: center;
      color: var(--text-sub);
    }
    .poll-msg.ok  { color: var(--accent); }
    .poll-msg.err { color: #e55a5a; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.25rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      border-radius: 0.625rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      border: none;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(30,180,140,0.2);
    }
    .btn-primary:hover:not(:disabled) { background: #22c99d; box-shadow: 0 6px 20px rgba(30,180,140,0.28); }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text-sub);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); }

    /* Help */
    .help-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .help-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.625rem;
      font-size: 0.8125rem;
      color: var(--text-sub);
      line-height: 1.6;
    }
    .help-num {
      flex-shrink: 0;
      width: 1.375rem; height: 1.375rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--accent);
      margin-top: 0.1rem;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @media (max-width: 480px) {
      .header { padding: 0.8rem 1rem; }
      .page-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="bg-deco" aria-hidden="true">
  <div class="bg-radial"></div>
  <div class="bg-ring bg-ring-1"></div>
  <div class="bg-ring bg-ring-2"></div>
</div>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <a href="/" class="btn-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
      <span data-i18n="common.back">返回</span>
    </a>
    <a href="/" class="header-brand">
      <div class="brand-logo">🌱</div>
      <span class="brand-name">Soulprout</span>
    </a>
  </div>
  <div class="header-right">
    <button type="button" class="btn-locale" id="btn-locale" onclick="GW_I18N.toggleLocale()">English</button>
    <span class="page-tag" data-i18n="weixin.pageTag">微信接入</span>
  </div>
</header>

<!-- Main -->
<main class="page-main">

  <div class="page-header">
    <p class="page-eyebrow" data-i18n="weixin.eyebrow">Platform · 接入配置</p>
    <h1 class="page-title">
      <span>💬</span> <span data-i18n="weixin.title">微信（个人号）</span>
    </h1>
    <p class="page-desc" data-i18n="weixin.desc">通过微信个人号接入 Soulprout，扫码登录后 Gateway 将自动建立长轮询连接。</p>
  </div>

  <!-- 连接状态 -->
  <div class="section-card">
    <p class="section-label" data-i18n="weixin.statusSection">连接状态</p>

    <div class="status-row">
      <span class="status-label" data-i18n="weixin.statusLabel">连接状态</span>
      <span id="badge-connected" class="badge badge-gray">检测中…</span>
    </div>
    <div class="status-row">
      <span class="status-label" data-i18n="weixin.accountId">账号 ID</span>
      <span id="txt-account" style="font-size:0.8125rem;color:var(--text-sub)">—</span>
    </div>
    <div class="status-row">
      <span class="status-label" data-i18n="weixin.savedAccounts">已保存账号数</span>
      <span id="txt-accounts" style="font-size:0.8125rem;color:var(--text-sub)">—</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="refreshStatus()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 2v6h-6M3 12a9 9 0 0115-6.7L21 8M3 22v-6h6M21 12a9 9 0 01-15 6.7L3 16" />
        </svg>
        <span data-i18n="common.refreshStatus">刷新状态</span>
      </button>
      <button class="btn btn-secondary" onclick="reloadAdapter()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
        <span data-i18n="common.reconnect">重新连接</span>
      </button>
    </div>
  </div>

  <!-- 扫码登录 -->
  <div class="section-card">
    <p class="section-label" data-i18n="weixin.loginSection">扫码登录</p>

    <div class="qr-wrap">
      <div class="qr-frame" id="qr-frame">
        <div class="qr-placeholder" data-i18n-html="weixin.qrPlaceholder">点击「获取二维码」<br>后在此处扫描</div>
      </div>
      <p class="qr-hint" id="qr-hint" data-i18n="weixin.qrHint">使用微信扫描上方二维码，在手机端确认登录</p>
      <a class="qr-link" id="qr-link" href="#" target="_blank" style="display:none"></a>
    </div>

    <p class="poll-msg" id="poll-msg"></p>

    <div class="btn-row" style="justify-content:center">
      <button id="btn-qr" class="btn btn-primary" data-i18n="common.getQr" onclick="startQR()">获取二维码</button>
      <button id="btn-cancel" class="btn btn-secondary" data-i18n="common.cancel" onclick="cancelQR()" style="display:none">取消</button>
    </div>
  </div>

  <!-- 使用说明 -->
  <div class="section-card">
    <p class="section-label" data-i18n="weixin.helpSection">使用说明</p>
    <ul class="help-list">
      <li>
        <span class="help-num">1</span>
        <span data-i18n="weixin.help1">点击「获取二维码」，使用微信 App 扫描</span>
      </li>
      <li>
        <span class="help-num">2</span>
        <span data-i18n="weixin.help2">在手机微信中点击「确认登录」</span>
      </li>
      <li>
        <span class="help-num">3</span>
        <span data-i18n="weixin.help3">登录成功后 Gateway 自动建立长轮询连接</span>
      </li>
      <li>
        <span class="help-num">4</span>
        <span data-i18n="weixin.help4">凭证本地保存，下次启动无需重新扫码</span>
      </li>
    </ul>
  </div>

</main>

<script src="/static/i18n.js"></script>
<script>
const { t } = GW_I18N;
window.__onLocaleChange = function () {
  GW_I18N.applyI18n();
  refreshStatus();
  if (!_pollTimer) resetQrBtnLabel();
};
function resetQrBtnLabel() {
  const btn = document.getElementById('btn-qr');
  if (btn && !btn.disabled) btn.textContent = t('common.getQr');
}

async function api(url, opts) {
  const r = await fetch(url, opts || {});
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function setPollMsg(text, cls) {
  const el = document.getElementById('poll-msg');
  el.textContent = text;
  el.className = 'poll-msg' + (cls ? ' ' + cls : '');
}

/* ─── Status ─── */
async function refreshStatus() {
  try {
    const d = await api('/api/status');
    const badge = document.getElementById('badge-connected');
    badge.className = 'badge ' + (d.connected ? 'badge-green' : 'badge-red');
    badge.textContent = d.connected ? t('common.connected') : t('common.disconnected');
    document.getElementById('txt-account').textContent = d.account_id || '—';
    document.getElementById('txt-accounts').textContent =
      d.saved_accounts && d.saved_accounts.length ? d.saved_accounts.join(', ') : t('weixin.none');
  } catch(e) {
    const badge = document.getElementById('badge-connected');
    badge.className = 'badge badge-yellow';
    badge.textContent = t('common.cannotConnect');
  }
}

async function reloadAdapter() {
  try {
    await api('/api/weixin/reload', { method: 'POST' });
    setPollMsg(t('common.reconnecting'), '');
    setTimeout(refreshStatus, 1800);
  } catch(e) {
    setPollMsg(t('common.reconnectFailed') + e.message, 'err');
  }
}

/* ─── QR Login ─── */
let _pollTimer = null;

async function startQR() {
  setBusy(true, t('weixin.gettingQr'));
  try {
    const d = await api('/api/weixin/login/start', { method: 'POST' });
    if (!d.success) { setBusy(false, d.error || t('weixin.getFailed'), true); return; }
    renderQR(d.qrcode_url, d.qrcode_value);
    setPollMsg(t('common.waitingScan'), '');
    document.getElementById('btn-cancel').style.display = '';
    document.getElementById('btn-qr').style.display = 'none';
    _pollTimer = setInterval(pollQR, 2000);
  } catch(e) {
    setBusy(false, t('common.networkError') + e.message, true);
  }
}

function renderQR(url, value) {
  const box = document.getElementById('qr-frame');
  const link = document.getElementById('qr-link');
  if (url && url.startsWith('http')) {
    box.innerHTML = '';
    const img = document.createElement('img');
    img.src = url;
    img.onerror = () => {
      box.innerHTML = '<div class="qr-placeholder">' + t('weixin.qrShowFailed') + '</div>';
    };
    box.appendChild(img);
  } else {
    box.innerHTML = '<div class="qr-placeholder">' + t('weixin.qrLinkFallback') + '</div>';
  }
  const scanUrl = url || value || '';
  if (scanUrl) {
    link.href = scanUrl;
    link.textContent = scanUrl;
    link.style.display = '';
  }
}

async function pollQR() {
  try {
    const d = await api('/api/weixin/login/poll');
    const s = d.status;
    if (s === 'wait')     setPollMsg(t('common.waitingScan'), '');
    else if (s === 'scaned')  setPollMsg(t('weixin.scanned'), '');
    else if (s === 'refreshed') {
      setPollMsg(t('weixin.refreshed'), '');
      renderQR(d.qrcode_url, d.qrcode_value);
    } else if (s === 'confirmed') {
      clearInterval(_pollTimer); _pollTimer = null;
      setPollMsg(t('weixin.success'), 'ok');
      resetQRUI();
      setTimeout(refreshStatus, 2000);
    } else if (s === 'error') {
      clearInterval(_pollTimer); _pollTimer = null;
      setPollMsg(t('weixin.failed') + (d.error || t('weixin.unknown')), 'err');
      resetQRUI();
    }
  } catch(e) {
    setPollMsg(t('common.pollFailed') + e.message, 'err');
  }
}

function cancelQR() {
  clearInterval(_pollTimer); _pollTimer = null;
  setPollMsg(t('common.cancelled'), '');
  resetQRUI();
  document.getElementById('qr-frame').innerHTML =
    '<div class="qr-placeholder">' + t('weixin.qrPlaceholder') + '</div>';
  document.getElementById('qr-link').style.display = 'none';
}

function resetQRUI() {
  document.getElementById('btn-cancel').style.display = 'none';
  document.getElementById('btn-qr').style.display = '';
  setBusy(false, '', false);
}

function setBusy(busy, text, isErr) {
  const btn = document.getElementById('btn-qr');
  btn.disabled = busy;
  btn.innerHTML = busy
    ? '<span class="spinner"></span> ' + t('common.loading')
    : t('common.getQr');
  if (text) setPollMsg(text, isErr ? 'err' : '');
}

/* ─── Init ─── */
GW_I18N.applyI18n();
refreshStatus();
setInterval(refreshStatus, 8000);
</script>
</body>
</html>
