<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soulprout Gateway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #06100d;
      --bg-card:      rgba(14, 26, 22, 0.85);
      --accent:       #1eb48c;
      --accent-dim:   rgba(30, 180, 140, 0.12);
      --accent-border:rgba(30, 180, 140, 0.22);
      --text:         #dff0e9;
      --text-sub:     rgba(223, 240, 233, 0.45);
      --text-muted:   rgba(223, 240, 233, 0.22);
      --border:       rgba(255, 255, 255, 0.06);
      --border-hover: rgba(30, 180, 140, 0.28);
      --shadow:       0 0 60px rgba(30,180,140,0.06), 0 4px 32px rgba(0,0,0,0.35);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-deco {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-radial {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 38%,
        rgba(30,180,140,0.055) 0%, transparent 68%);
    }
    .bg-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }
    .bg-ring-1 { width: 900px; height: 900px; border: 1px solid rgba(30,180,140,0.04); }
    .bg-ring-2 { width: 560px; height: 560px; border: 1px solid rgba(30,180,140,0.06); }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2rem;
      background: rgba(6, 16, 13, 0.75);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    .brand-logo {
      width: 2rem; height: 2rem;
      background: linear-gradient(135deg, #1eb48c 0%, #0fa06e 100%);
      border-radius: 0.5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .brand-tag {
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-left: 0.375rem;
      opacity: 0.7;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .btn-locale {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 0.35rem 0.75rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .btn-locale:hover {
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 2rem;
      padding: 0.3rem 0.75rem 0.3rem 0.3rem;
    }
    .user-avatar {
      width: 1.75rem; height: 1.75rem;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8125rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .user-email {
      font-size: 0.8125rem;
      color: var(--text-sub);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.375rem 0.875rem;
      border-radius: 2rem;
      font-size: 0.8125rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn-logout:hover { border-color: #e55a5a; color: #e55a5a; }

    .page-main {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1.5rem 3rem;
    }

    .login-wrap {
      width: 100%;
      max-width: 440px;
    }
    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow: var(--shadow);
    }
    .card-eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(30,180,140,0.5);
      font-weight: 300;
      margin-bottom: 0.75rem;
    }
    .card-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }
    .card-desc {
      font-size: 0.875rem;
      color: var(--text-sub);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .form { display: flex; flex-direction: column; gap: 0.875rem; }
    .input-field {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      color: var(--text);
      font-size: 0.9375rem;
      font-family: inherit;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(30,180,140,0.1);
    }
    .input-field:disabled { opacity: 0.5; cursor: not-allowed; }

    .code-row { display: flex; gap: 0.625rem; }
    .code-input { flex: 1; }
    .code-btn {
      flex-shrink: 0;
      padding: 0 1rem;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 0.625rem;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      min-width: 7.5rem;
      transition: all 0.25s;
    }
    .code-btn:hover:not(:disabled) {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .code-btn:disabled { color: var(--text-muted); border-color: var(--border); cursor: not-allowed; }

    .status-msg { font-size: 0.8125rem; min-height: 1.1rem; }
    .status-msg.ok  { color: var(--accent); }
    .status-msg.err { color: #e55a5a; }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 0.875rem 2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 500;
      font-family: inherit;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      box-shadow: 0 4px 20px rgba(30,180,140,0.22);
    }
    .cta-btn:hover:not(:disabled) {
      background: #22c99d;
      box-shadow: 0 8px 28px rgba(30,180,140,0.32);
      transform: translateY(-2px);
    }
    .cta-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .cta-btn svg { transition: transform 0.3s; }
    .cta-btn:hover:not(:disabled) svg { transform: translateX(3px); }

    .hint-text {
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
      line-height: 1.6;
    }

    .conn-block {
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.875rem 1rem;
      background: rgba(255,255,255,0.02);
    }
    .conn-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .conn-title {
      font-size: 0.8125rem;
      color: var(--text-sub);
    }
    .conn-toggle {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
    }
    .conn-options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .conn-option {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-sub);
      cursor: pointer;
      line-height: 1.4;
    }
    .conn-option input { accent-color: var(--accent); margin-top: 0.15rem; flex-shrink: 0; }
    .conn-option-body { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
    .conn-option-label { color: var(--text); }
    .conn-option-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      word-break: break-all;
    }
    .conn-option-meta .region-tag {
      color: var(--accent);
      margin-right: 0.35rem;
    }
    .conn-custom { margin-top: 0.625rem; }

    .url-readonly {
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      font-size: 0.875rem;
      color: var(--text-sub);
      word-break: break-all;
      margin-bottom: 0.75rem;
    }

    .dashboard { width: 100%; max-width: 560px; }

    .dash-header { margin-bottom: 2rem; }
    .dash-eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(30,180,140,0.5);
      font-weight: 300;
      margin-bottom: 0.5rem;
    }
    .dash-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .dash-sub {
      font-size: 0.875rem;
      color: var(--text-sub);
      font-weight: 300;
      line-height: 1.6;
    }

    .section-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.5rem 1.75rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.35s;
    }
    .section-card:hover { border-color: rgba(30,180,140,0.14); }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(30,180,140,0.45);
      font-weight: 300;
      margin-bottom: 1.25rem;
    }

    .input-row {
      display: flex;
      gap: 0.625rem;
      margin-bottom: 0.625rem;
    }
    .input-row .input-field { flex: 1; }

    .btn-sm {
      flex-shrink: 0;
      padding: 0 1rem;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 0.625rem;
      font-size: 0.8125rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s;
    }
    .btn-sm:hover:not(:disabled) {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .url-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }
    .url-hint code { color: var(--accent); }

    .mode-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .mode-label { font-size: 0.875rem; color: var(--text-sub); }

    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .badge-green  { background: rgba(30,180,140,0.14); color: var(--accent); }
    .badge-gray   { background: rgba(255,255,255,0.06); color: var(--text-sub); }
    .badge-blue   { background: rgba(88,166,255,0.12);  color: #58a6ff; }

    .save-msg { font-size: 0.8125rem; min-height: 1.1rem; margin-top: 0.5rem; }
    .save-msg.ok  { color: var(--accent); }
    .save-msg.err { color: #e55a5a; }

    .platform-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .platform-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.875rem 1rem;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 0.875rem;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s;
    }
    .platform-item:hover {
      border-color: var(--border-hover);
      background: rgba(30,180,140,0.05);
    }
    .platform-icon {
      width: 2.5rem; height: 2.5rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 0.625rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }
    .platform-info { flex: 1; }
    .platform-name {
      font-size: 0.9375rem;
      font-weight: 500;
      margin-bottom: 0.2rem;
    }
    .platform-desc { font-size: 0.8125rem; color: var(--text-sub); }
    .platform-arrow {
      color: var(--text-muted);
      transition: transform 0.3s, color 0.3s;
    }
    .platform-item:hover .platform-arrow { color: var(--accent); transform: translateX(3px); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .page-loading {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.25rem; border-radius: 1.125rem; }
      .card-title { font-size: 1.5rem; }
      .code-row { flex-direction: column; }
      .code-btn { width: 100%; padding: 0.7rem; text-align: center; }
      .header { padding: 0.8rem 1rem; }
      .brand-tag { display: none; }
    }
  </style>
</head>
<body>

<div class="bg-deco" aria-hidden="true">
  <div class="bg-radial"></div>
  <div class="bg-ring bg-ring-1"></div>
  <div class="bg-ring bg-ring-2"></div>
</div>

<div id="page-loading" class="page-loading">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<header class="header">
  <a href="/" class="header-brand">
    <div class="brand-logo">🌱</div>
    <span class="brand-name">Soulprout<span class="brand-tag">Gateway</span></span>
  </a>
  <div class="header-right">
    <button type="button" class="btn-locale" id="btn-locale" onclick="GW_I18N.toggleLocale()">English</button>
    <div id="header-user" style="display:none; align-items:center; gap:0.75rem;">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar-char">?</div>
        <span class="user-email" id="header-email">—</span>
      </div>
      <button class="btn-logout" data-i18n="index.logout" onclick="doLogout()">退出登录</button>
    </div>
  </div>
</header>

<main class="page-main">

  <div id="view-login" class="login-wrap" style="display:none">
    <div class="login-card">
      <p class="card-eyebrow" data-i18n="index.loginEyebrow">Gateway · 账号登录</p>
      <h1 class="card-title" data-i18n="index.loginTitle">登录 Soulprout</h1>
      <p class="card-desc" data-i18n="index.loginDesc">使用你的 Soulprout 账号登录，即可管理 Gateway 平台接入配置。</p>

      <form class="form" onsubmit="return false">
        <div class="conn-block">
          <div class="conn-head">
            <span class="conn-title" data-i18n="index.connTitle">连接 Soulprout 服务</span>
            <button type="button" class="conn-toggle" id="btn-conn-toggle" onclick="toggleConnCustom()">自定义地址</button>
          </div>
          <div id="conn-default-view" class="conn-options">
            <!-- 云域名选项由 JS 渲染 -->
          </div>
          <div id="conn-custom-view" style="display:none">
            <div class="conn-options" id="conn-custom-cloud-options">
              <!-- 自定义视图中的云域名选项由 JS 渲染 -->
            </div>
            <label class="conn-option" style="margin-top:0.5rem">
              <input type="radio" name="conn-mode" value="self" onchange="onConnModeChange()" />
              <span class="conn-option-body">
                <span class="conn-option-label" data-i18n="index.cloudSelf">自部署服务器</span>
              </span>
            </label>
            <input id="login-agent-url" class="input-field conn-custom" type="text"
                   placeholder="http://localhost:8080" />
          </div>
        </div>

        <input id="login-email" class="input-field" type="email"
               data-i18n-placeholder="index.emailPh" placeholder="邮箱地址" autocomplete="email" />

        <div class="code-row">
          <input id="login-code" class="input-field code-input" type="text"
                 data-i18n-placeholder="index.codePh" placeholder="6 位邮箱验证码" inputmode="numeric" maxlength="6" />
          <button id="btn-code" class="code-btn" type="button" data-i18n="index.getCode" onclick="sendCode()">获取验证码</button>
        </div>

        <input id="login-username" class="input-field" type="text"
               data-i18n-placeholder="index.usernamePh" placeholder="昵称（可选，首次登录用）" maxlength="32" />

        <span id="login-msg" class="status-msg"></span>

        <button id="btn-login" class="cta-btn" type="button" onclick="doLogin()">
          <span data-i18n="index.loginBtn">登录 / 注册</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </button>
      </form>

      <p class="hint-text" data-i18n="index.loginHint">未注册的邮箱将自动创建账号</p>
    </div>
  </div>

  <div id="view-dash" class="dashboard" style="display:none">
    <div class="dash-header">
      <p class="dash-eyebrow" data-i18n="index.dashEyebrow">Gateway · 管理面板</p>
      <h1 class="dash-title" data-i18n="index.dashTitle">服务配置</h1>
      <p class="dash-sub" id="dash-desc" data-i18n="index.dashDesc">配置 Agent 服务地址，并管理各平台接入状态。</p>
    </div>

    <div class="section-card">
      <p class="section-label" data-i18n="index.agentSection">Agent 服务</p>

      <div id="dash-url-display" class="url-readonly">—</div>

      <div class="mode-row">
        <span class="mode-label" data-i18n="index.currentMode">当前模式</span>
        <span id="badge-mode" class="badge badge-gray">检测中…</span>
      </div>

      <p class="url-hint" data-i18n="index.changeUrlHint">如需更换服务地址，请退出登录后在登录页重新选择。</p>

      <div class="input-row">
        <button class="btn-sm" data-i18n="index.testConn" onclick="testConn()">测试连接</button>
      </div>

      <div id="url-msg" class="save-msg"></div>
    </div>

    <div class="section-card">
      <p class="section-label" data-i18n="index.platforms">接入平台</p>
      <div class="platform-list">
        <a href="/weixin" class="platform-item">
          <div class="platform-icon">💬</div>
          <div class="platform-info">
            <div class="platform-name" data-i18n="index.weixinName">微信（个人号）</div>
            <div class="platform-desc" id="weixin-status-text">加载中…</div>
          </div>
          <svg class="platform-arrow" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6" />
          </svg>
        </a>
        <a href="/feishu" class="platform-item">
          <div class="platform-icon">🪽</div>
          <div class="platform-info">
            <div class="platform-name" data-i18n="index.feishuName">飞书 / Lark</div>
            <div class="platform-desc" id="feishu-status-text">加载中…</div>
          </div>
          <svg class="platform-arrow" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6" />
          </svg>
        </a>
        <a href="/wecom" class="platform-item">
          <div class="platform-icon">💼</div>
          <div class="platform-info">
            <div class="platform-name" data-i18n="index.wecomName">企业微信</div>
            <div class="platform-desc" id="wecom-status-text">加载中…</div>
          </div>
          <svg class="platform-arrow" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6" />
          </svg>
        </a>
        <a href="/xiaoai" class="platform-item">
          <div class="platform-icon">🔊</div>
          <div class="platform-info">
            <div class="platform-name" data-i18n="index.xiaoaiName">小爱音箱</div>
            <div class="platform-desc" id="xiaoai-status-text">加载中…</div>
          </div>
          <svg class="platform-arrow" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6" />
          </svg>
        </a>
      </div>
    </div>
  </div>

</main>

<script src="/static/i18n.js"></script>
<script>
const { t } = GW_I18N;

async function api(url, opts) {
  const r = await fetch(url, opts || {});
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function setMsg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  const base = id === 'url-msg' ? 'save-msg' : 'status-msg';
  el.className = base + (type ? ' ' + type : '');
}

const LOCAL_AGENT_URL = 'http://localhost:8080';
const FALLBACK_CLOUD_URLS = [
  { url: 'https://mengya.chat', region: 'cn', label_zh: '中国大陆', label_en: 'Mainland China' },
  { url: 'https://www.soulprout.com', region: 'overseas', label_zh: '海外', label_en: 'Overseas' },
];
let CLOUD_URLS = FALLBACK_CLOUD_URLS.slice();
let DEFAULT_AGENT_URL = FALLBACK_CLOUD_URLS[0].url;
let _selectedCloudUrl = DEFAULT_AGENT_URL;
let _connCustomOpen = false;
let _lastDashSettings = null;
let _cdLeft = 0;

function isLocalAgentUrl(url) {
  const v = (url || '').toLowerCase().trim();
  return !v || v.startsWith('http://localhost') || v.startsWith('http://127.') || v.startsWith('http://0.0.0.0');
}

function normalizeUrl(url) {
  return (url || '').trim().replace(/\/+$/, '');
}

function isKnownCloudUrl(url) {
  const n = normalizeUrl(url).toLowerCase();
  return CLOUD_URLS.some(c => normalizeUrl(c.url).toLowerCase() === n);
}

function regionLabel(item) {
  return GW_I18N.getLocale() === 'en' ? (item.label_en || item.label_zh) : (item.label_zh || item.label_en);
}

function cloudOptionLabelKey(item) {
  return item.region === 'overseas' ? 'index.cloudOverseas' : 'index.cloudCn';
}

function renderCloudOptions() {
  const defaultView = document.getElementById('conn-default-view');
  const customCloud = document.getElementById('conn-custom-cloud-options');
  if (!defaultView || !customCloud) return;

  const selected = normalizeUrl(_selectedCloudUrl) || DEFAULT_AGENT_URL;

  defaultView.innerHTML = CLOUD_URLS.map((item, idx) => {
    const checked = normalizeUrl(item.url).toLowerCase() === selected.toLowerCase() ||
      (!isKnownCloudUrl(selected) && idx === 0);
    return `<label class="conn-option">
      <input type="radio" name="conn-cloud" value="${item.url}" ${checked ? 'checked' : ''} onchange="onCloudSelect()" />
      <span class="conn-option-body">
        <span class="conn-option-label">${t(cloudOptionLabelKey(item))}</span>
        <span class="conn-option-meta"><span class="region-tag">${regionLabel(item)}</span>${item.url}</span>
      </span>
    </label>`;
  }).join('');

  customCloud.innerHTML = CLOUD_URLS.map((item, idx) => {
    const checked = !_connCustomOpen ? false :
      (document.querySelector('input[name="conn-mode"]:checked')?.value !== 'self' &&
       (normalizeUrl(item.url).toLowerCase() === selected.toLowerCase() ||
        (!isKnownCloudUrl(selected) && idx === 0)));
    // In custom view, cloud radios share name="conn-mode" with value=cloud URL via data
    return `<label class="conn-option">
      <input type="radio" name="conn-mode" value="cloud" data-cloud-url="${item.url}"
             ${document.querySelector('input[name="conn-mode"]:checked')?.value === 'self' ? '' : (normalizeUrl(item.url).toLowerCase() === selected.toLowerCase() || (!isKnownCloudUrl(selected) && idx === 0) ? 'checked' : '')}
             onchange="onConnModeChange()" />
      <span class="conn-option-body">
        <span class="conn-option-label">${t(cloudOptionLabelKey(item))}</span>
        <span class="conn-option-meta"><span class="region-tag">${regionLabel(item)}</span>${item.url}</span>
      </span>
    </label>`;
  }).join('');
}

function onCloudSelect() {
  const checked = document.querySelector('input[name="conn-cloud"]:checked');
  if (checked) _selectedCloudUrl = checked.value;
}

function toggleConnCustom(forceOpen) {
  _connCustomOpen = typeof forceOpen === 'boolean' ? forceOpen : !_connCustomOpen;
  document.getElementById('conn-default-view').style.display = _connCustomOpen ? 'none' : '';
  document.getElementById('conn-custom-view').style.display = _connCustomOpen ? '' : 'none';
  document.getElementById('btn-conn-toggle').textContent =
    _connCustomOpen ? t('index.connUseDefault') : t('index.connCustom');
  if (_connCustomOpen) {
    renderCloudOptions();
    const selfRadio = document.querySelector('#conn-custom-view input[name="conn-mode"][value="self"]');
    if (isLocalAgentUrl(document.getElementById('login-agent-url').value)) {
      if (selfRadio) selfRadio.checked = true;
    }
  } else {
    renderCloudOptions();
  }
  onConnModeChange();
}

function onConnModeChange() {
  const mode = document.querySelector('#conn-custom-view input[name="conn-mode"]:checked')?.value || 'cloud';
  const customInput = document.getElementById('login-agent-url');
  if (customInput) customInput.style.display = (_connCustomOpen && mode === 'self') ? '' : 'none';
  if (_connCustomOpen && mode === 'cloud') {
    const cloudRadio = document.querySelector('#conn-custom-view input[name="conn-mode"][value="cloud"]:checked');
    if (cloudRadio?.dataset.cloudUrl) _selectedCloudUrl = cloudRadio.dataset.cloudUrl;
  }
}

function getLoginAgentUrl() {
  if (!_connCustomOpen) {
    const checked = document.querySelector('input[name="conn-cloud"]:checked');
    return (checked?.value || _selectedCloudUrl || DEFAULT_AGENT_URL).trim();
  }
  const modeEl = document.querySelector('#conn-custom-view input[name="conn-mode"]:checked');
  const mode = modeEl?.value || 'cloud';
  if (mode === 'cloud') {
    return (modeEl?.dataset.cloudUrl || _selectedCloudUrl || DEFAULT_AGENT_URL).trim();
  }
  return document.getElementById('login-agent-url').value.trim() || LOCAL_AGENT_URL;
}

function applyLoginConnSettings(d) {
  if (Array.isArray(d?.cloud_urls) && d.cloud_urls.length) {
    CLOUD_URLS = d.cloud_urls;
  }
  if (d?.default_agent_url) DEFAULT_AGENT_URL = d.default_agent_url;

  const url = normalizeUrl(d?.agent_url || DEFAULT_AGENT_URL);
  _selectedCloudUrl = isKnownCloudUrl(url) ? url : DEFAULT_AGENT_URL;

  if (isLocalAgentUrl(url)) {
    document.getElementById('login-agent-url').value = url || LOCAL_AGENT_URL;
    toggleConnCustom(true);
    const selfRadio = document.querySelector('#conn-custom-view input[name="conn-mode"][value="self"]');
    if (selfRadio) selfRadio.checked = true;
  } else if (url && !isKnownCloudUrl(url)) {
    // 未知自定义远端地址 → 自定义视图，选云服务并填入（用户可改）
    document.getElementById('login-agent-url').value = url;
    _selectedCloudUrl = DEFAULT_AGENT_URL;
    toggleConnCustom(true);
    // 当作自部署自定义 URL 处理更合理
    const selfRadio = document.querySelector('#conn-custom-view input[name="conn-mode"][value="self"]');
    if (selfRadio) selfRadio.checked = true;
  } else {
    toggleConnCustom(false);
    renderCloudOptions();
  }
  onConnModeChange();
}

function refreshStaticI18n() {
  GW_I18N.applyI18n();
  document.getElementById('btn-conn-toggle').textContent =
    _connCustomOpen ? t('index.connUseDefault') : t('index.connCustom');
  renderCloudOptions();
  if (_cdLeft > 0) {
    document.getElementById('btn-code').textContent = `${_cdLeft}${t('index.resendAfter')}`;
  }
  if (_lastDashSettings && document.getElementById('view-dash').style.display !== 'none') {
    showDash(_lastDashSettings);
  } else {
    // 刷新平台状态文案（若已登录）
    const weixinEl = document.getElementById('weixin-status-text');
    if (weixinEl && document.getElementById('view-dash').style.display !== 'none') {
      loadWeixinStatus();
      loadFeishuStatus();
      loadWecomStatus();
      loadXiaoaiStatus();
    }
  }
}

window.__onLocaleChange = function () {
  refreshStaticI18n();
};

async function init() {
  GW_I18N.applyI18n();
  try {
    const d = await api('/api/settings');
    if (d.default_agent_url) DEFAULT_AGENT_URL = d.default_agent_url;
    if (Array.isArray(d.cloud_urls) && d.cloud_urls.length) CLOUD_URLS = d.cloud_urls;
    applyLoginConnSettings(d);
    if (d.has_token && d.agent_user_id) {
      showDash(d);
    } else {
      showLogin();
    }
  } catch(e) {
    renderCloudOptions();
    showLogin();
  }
  document.getElementById('page-loading').style.display = 'none';
}

function showLogin() {
  document.getElementById('view-login').style.display = '';
  document.getElementById('view-dash').style.display = 'none';
  document.getElementById('header-user').style.display = 'none';
}

function showDash(d) {
  _lastDashSettings = d;
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-dash').style.display = '';
  document.getElementById('header-user').style.display = 'flex';

  const label = d.agent_email || d.agent_user_id || t('index.userFallback');
  document.getElementById('header-email').textContent = label;
  document.getElementById('user-avatar-char').textContent = (label[0] || 'U').toUpperCase();
  document.getElementById('dash-desc').textContent = t('index.dashDescUser', { user: label });

  document.getElementById('dash-url-display').textContent = d.agent_url || DEFAULT_AGENT_URL;
  updateModeUI(d.is_local);
  GW_I18N.applyI18n();
  loadWeixinStatus();
  loadFeishuStatus();
  loadWecomStatus();
  loadXiaoaiStatus();
}

function updateModeUI(isLocal) {
  const el = document.getElementById('badge-mode');
  if (!el) return;
  if (isLocal === true)  { el.className = 'badge badge-blue';  el.textContent = t('index.modeLocal'); }
  else if (isLocal === false) { el.className = 'badge badge-green'; el.textContent = t('index.modeRemote'); }
  else { el.className = 'badge badge-gray'; el.textContent = t('common.detecting'); }
}

let _cdTimer = null;
function startCD(n) {
  const btn = document.getElementById('btn-code');
  btn.disabled = true;
  _cdLeft = n;
  btn.textContent = `${_cdLeft}${t('index.resendAfter')}`;
  if (_cdTimer) clearInterval(_cdTimer);
  _cdTimer = setInterval(() => {
    _cdLeft--;
    if (_cdLeft <= 0) {
      clearInterval(_cdTimer); _cdTimer = null;
      _cdLeft = 0;
      btn.disabled = false;
      btn.textContent = t('index.getCode');
    } else { btn.textContent = `${_cdLeft}${t('index.resendAfter')}`; }
  }, 1000);
}

async function sendCode() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { setMsg('login-msg', t('index.fillEmail'), 'err'); return; }
  setMsg('login-msg', t('index.sending'), '');
  try {
    const d = await api('/api/auth/email/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, agent_url: getLoginAgentUrl() }),
    });
    if (d.success) { setMsg('login-msg', t('index.codeSent'), 'ok'); startCD(60); }
    else { setMsg('login-msg', d.message || t('index.sendFailed'), 'err'); }
  } catch(e) { setMsg('login-msg', t('index.sendFailedPrefix') + e.message, 'err'); }
}

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const code     = document.getElementById('login-code').value.trim();
  const username = document.getElementById('login-username').value.trim();
  if (!email || !code) { setMsg('login-msg', t('index.fillEmailCode'), 'err'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const d = await api('/api/auth/email/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email,
        code,
        username: username || null,
        agent_url: getLoginAgentUrl(),
      }),
    });
    if (d.success) {
      const settings = await api('/api/settings');
      showDash(settings);
    } else { setMsg('login-msg', d.message || t('index.loginFailed'), 'err'); }
  } catch(e) { setMsg('login-msg', t('index.loginFailedPrefix') + e.message, 'err'); }
  finally {
    btn.disabled = false;
    btn.innerHTML = `<span>${t('index.loginBtn')}</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
  }
}

async function doLogout() {
  if (!confirm(t('index.logoutConfirm'))) return;
  await api('/api/settings/logout', { method: 'POST' });
  try {
    const d = await api('/api/settings');
    if (d.default_agent_url) DEFAULT_AGENT_URL = d.default_agent_url;
    if (Array.isArray(d.cloud_urls) && d.cloud_urls.length) CLOUD_URLS = d.cloud_urls;
    applyLoginConnSettings(d);
  } catch (e) {}
  showLogin();
}

async function testConn() {
  setMsg('url-msg', t('index.testing'), '');
  try {
    const d = await api('/api/settings/test', { method: 'POST' });
    setMsg('url-msg', (d.success ? '✓ ' : '✗ ') + d.message, d.success ? 'ok' : 'err');
  } catch(e) { setMsg('url-msg', t('index.testFailed') + e.message, 'err'); }
}

async function loadWeixinStatus() {
  try {
    const d = await api('/api/weixin/status');
    const el = document.getElementById('weixin-status-text');
    if (!el) return;
    if (d.connected) {
      el.textContent = t('index.weixinConnected', { id: d.account_id || '' });
      el.style.color = 'var(--accent)';
    } else {
      el.textContent = t('index.weixinIdle');
      el.style.color = 'var(--text-sub)';
    }
  } catch(e) {}
}

async function loadFeishuStatus() {
  try {
    const d = await api('/api/feishu/status');
    const el = document.getElementById('feishu-status-text');
    if (!el) return;
    if (d.connected) {
      el.textContent = t('index.feishuConnected', { id: d.bot_name || d.app_id || '' });
      el.style.color = 'var(--accent)';
    } else if (d.configured) {
      el.textContent = t('index.feishuConfigured');
      el.style.color = 'var(--text-sub)';
    } else {
      el.textContent = t('index.feishuIdle');
      el.style.color = 'var(--text-sub)';
    }
  } catch(e) {}
}

async function loadWecomStatus() {
  try {
    const d = await api('/api/wecom/status');
    const el = document.getElementById('wecom-status-text');
    if (!el) return;
    if (d.connected) {
      el.textContent = t('index.wecomConnected', { id: d.bot_name || d.bot_id || '' });
      el.style.color = 'var(--accent)';
    } else if (d.configured) {
      el.textContent = t('index.wecomConfigured');
      el.style.color = 'var(--text-sub)';
    } else {
      el.textContent = t('index.wecomIdle');
      el.style.color = 'var(--text-sub)';
    }
  } catch(e) {}
}

async function loadXiaoaiStatus() {
  try {
    const d = await api('/api/xiaoai/status');
    const el = document.getElementById('xiaoai-status-text');
    if (!el) return;
    if (d.connected) {
      el.textContent = t('index.xiaoaiConnected', { id: d.device_name || '' });
      el.style.color = 'var(--accent)';
    } else if (d.configured) {
      el.textContent = t('index.xiaoaiConfigured');
      el.style.color = 'var(--text-sub)';
    } else {
      el.textContent = t('index.xiaoaiIdle');
      el.style.color = 'var(--text-sub)';
    }
  } catch(e) {}
}

init();
</script>
</body>
